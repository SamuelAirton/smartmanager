<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SmartManager</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>SmartManager</h1>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="text" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;">

  <button onclick="logout()">Logout</button>

  <h2>Dashboard</h2>

  <div id="cards">
    <div class="card">
      <h4>Total de Produtos</h4>
      <p id="totalProdutos">0</p>
    </div>

    <div class="card">
      <h4>Total em Estoque</h4>
      <p id="totalQuantidade">0</p>
    </div>

    <div class="card">
      <h4>Valor Total (€)</h4>
      <p id="valorTotal">0</p>
    </div>
  </div>

  <canvas id="grafico"></canvas>

  <h2>Produtos</h2>

  <input type="text" id="nome" placeholder="Nome">
  <input type="number" id="preco" placeholder="Preço">
  <input type="number" id="quantidade" placeholder="Quantidade">

  <button onclick="adicionarProduto()">Adicionar</button>

  <ul id="lista"></ul>

  <h2>Vendas</h2>

  <select id="produtoSelect"></select>
  <input type="number" id="quantidadeVenda" placeholder="Quantidade">

  <button onclick="adicionarItem()">Adicionar Item</button>
  <button onclick="finalizarVenda()">Finalizar Venda</button>
  <button onclick="limparCarrinho()">Limpar Carrinho</button>

  <ul id="carrinho"></ul>

  <h3>Histórico</h3>
  <ul id="listaVendas"></ul>

</div>

<script src="js/auth.js"></script>
<script src="js/produtos.js"></script>
<script src="js/vendas.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
